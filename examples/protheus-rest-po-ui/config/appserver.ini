[General]
ConsoleLog=1
BuildKillUsers=1
MAXSTRINGSIZE=10

[Drivers]
Active=TCP

[TCP]
TYPE=TCPIP
PORT=1234

[HTTP]
ENABLE=1
PORT=8080
PATH=/webapp

[SSLConfigure]
Verbose=1
TLS1_2=1
Bugs=1
State=1
CertificateServer=C:\totvs\certs\server.crt
KeyServer=C:\totvs\certs\server.key

[MultiProtocol]
Port=8443
PortSecure=1
Listen=0.0.0.0

[Service]
Name=protheus_rest
MultiProtocolPort=1
MultiProtocolPortSecure=1

[WebApp]
Port=8080
SourcesPath=C:\totvs\webapp
Enable=1

[REST]
Enable=1
Port=8089
Instances=1,2
CORSEnable=1
AllowOrigin=*
AllowMethods=GET,POST,PUT,DELETE,OPTIONS
AllowHeaders=Content-Type,Authorization

[Environment]
SourcePath=C:\totvs\protheus\apo
RootPath=C:\totvs\protheus_data
StartPath=\system\
RpoDb=top
RpoLanguage=multi
LocalFiles=ctree
Trace=0
SpecialKey=protheus

[protheus_rest]
SourcePath=C:\totvs\protheus\apo
RootPath=C:\totvs\protheus_data
StartPath=\system\
RpoDb=top
RpoLanguage=multi
LocalFiles=ctree
Trace=0
DBDatabase=protheus
DBAlias=protheus
DBServer=127.0.0.1
DBPort=7890
DBUser=totvs
DBPassword=totvs
